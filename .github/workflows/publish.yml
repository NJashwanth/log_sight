name: Package and Publish Extension

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Visual Studio Marketplace"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Resolve package metadata
        id: metadata
        run: |
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          PACKAGE_FILE=$(node -p 'const pkg=require("./package.json"); "artifacts/" + pkg.name + "-" + pkg.version + ".vsix"')
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

          TAG="v$PACKAGE_VERSION"
          if git tag --list "$TAG" | grep -q .; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          npx @vscode/vsce package --out "${{ steps.metadata.outputs.package_file }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: ${{ steps.metadata.outputs.package_file }}

      - name: Tag and publish on merge to main
        if: github.ref == 'refs/heads/main' && steps.metadata.outputs.tag_exists == 'false'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.metadata.outputs.version }}"
          git push origin "v${{ steps.metadata.outputs.version }}"
          npx @vscode/vsce publish --packagePath "${{ steps.metadata.outputs.package_file }}"

      - name: Publish to Visual Studio Marketplace
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "${{ steps.metadata.outputs.package_file }}"
