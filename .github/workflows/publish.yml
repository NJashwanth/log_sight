name: Package and Publish Extension

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Visual Studio Marketplace"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Resolve package metadata
        id: metadata
        run: |
          echo "package_file=$(node -p \"const pkg=require('./package.json'); 'artifacts/' + pkg.name + '-' + pkg.version + '.vsix'\")" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          npx @vscode/vsce package --out "${{ steps.metadata.outputs.package_file }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: ${{ steps.metadata.outputs.package_file }}

      - name: Publish to Visual Studio Marketplace
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "${{ steps.metadata.outputs.package_file }}"